apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-service
  namespace: fraud-shield
  labels:
    app: java-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-service
  template:
    metadata:
      labels:
        app: java-service
    spec:
      containers:
        - name: java-service
          image: fraud-shield/java-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ML_SERVICE_URL
              value: "http://ml-service:8000"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: java-service
  namespace: fraud-shield
spec:
  selector:
    app: java-service
  ports:
    - port: 8080
      targetPort: 8080
  type: NodePort
